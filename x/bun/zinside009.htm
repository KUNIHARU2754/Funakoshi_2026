<br>９．「今から他社を訪れるのに」
<br><br>
　朝９時にホテルにギリシャ美人に来てもらった。ホテルにはチェックアウトが１１時に
なるけどいいかと確認したら、通常追加料金を貰いますが１時間だけですので結構で
すと連絡をもらい、彼女が来るのを待ちながら荷物をまとめた。
<br>　直ぐに来てくれた。朝日を浴びながらドギースタイルはまるでＡＶを観ている感じ
の不思議な体験である。顔には見慣れたので普通に出来た。<br>
美人３日すれば見飽きる、ブス３日すれば見慣れるとはよく言ったものである。
<br>　その後１１時に何事もなかったようにチェックアウトし１１：３０に他社を訪れていた。
