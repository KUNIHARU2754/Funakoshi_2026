<br/>２．「私は郵便料金を値切ってしまったのだろうか？」
<br/><br/>
　　２度目の海外渡航で前回と同じ時間帯の日本国籍機に搭乗。今度は日本語で「ＪＡＬの
封筒と便箋を下さい」と言って貰った。子供達に記念にと思いバンコク到着前に手紙を
書き終える。タイ空港内の郵便局で手紙をだす。郵便局員は１７０バーツと言ってきた。
え？前回出したときは５０バーツだったのに。思わず、抗議する。どうも約３ヶ月のエ
ジプト出張生活が染みついてしまったようである。
<br/>
「前回５０だったのに何故１７０何だ！」と言ったら、ちょっと間をおいて再チェック
したような顔をして
<br/>
「ＯＫ５０」
<br/>
私は郵便料金を値切ってしまったのだろうか？
<br/><br/><br/><br/><br/>
